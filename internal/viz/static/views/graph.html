  <div class="view view-full" id="graph-view" style="position:relative;">
    <div class="graph-controls">
      <label>Namespace:</label>
      <select id="ns-filter"><option value="">All</option></select>
      <label>Tag:</label>
      <select id="tag-filter"><option value="">All</option></select>
      <label>Similarity:</label>
      <input type="range" id="threshold" min="0.50" max="0.99" step="0.01" value="0.85">
      <span class="threshold-val" id="threshold-val">0.85</span>
      <span id="tag-filter-label" style="display:none;font-size:13px;color:var(--orange)"></span>
      <button id="reset-graph-filters" class="toolbar-btn" type="button">Reset</button>
    </div>
    <div id="graph-container"></div>
    <div class="legend" id="legend"></div>
    <div class="detail-panel" id="detail-panel">
      <button class="close-btn" id="detail-close">&times;</button>
      <h3>Fact Details</h3>
      <div class="fact-text" id="detail-text"></div>
      <div class="meta" id="detail-meta"></div>
      <div class="tag-editor">
        <label for="detail-tags">Tags</label>
        <div class="tag-editor-row">
          <input id="detail-tags" type="text" autocomplete="off">
          <button id="save-tags" class="toolbar-btn" type="button">Save</button>
        </div>
        <div id="tag-save-status" class="save-status"></div>
      </div>
      <details class="payload-details" id="payload-details" style="display:none">
        <summary>Payload</summary>
        <div id="payload-keys"></div>
        <pre id="payload-json"></pre>
      </details>
    </div>
  </div>
