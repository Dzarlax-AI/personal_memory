name: Build and push Docker image

on:
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "internal/viz/static/**"
      - ".github/workflows/docker.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant@sha256:f1c7272cdac52b38c1a0e89313922d940ba50afd90d593a1605dbbc214e66ffb
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: make dev-deps
      - name: Wait for Qdrant
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:6333/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - run: go vet ./...
      - run: go test ./...
        env:
          QDRANT_TEST_URL: http://127.0.0.1:6333

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute tags based on the branch:
      #   main    → :latest + :main + :sha-<short>
      #   feature → :beta   + :feature-<name> + :sha-<short>
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/dzarlax-ai/personal-memory
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=beta,enable=${{ github.ref_name != github.event.repository.default_branch }}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            DS_CACHEBUST=${{ github.run_id }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
