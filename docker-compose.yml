services:
  memory-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: memory-embeddings
    command: --model-id ${EMBED_MODEL:-intfloat/multilingual-e5-small} --revision main
    restart: always
    networks:
      - traefik
    deploy:
      resources:
        limits:
          memory: 2G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.memory-embed.entrypoints=https"
      - "traefik.http.routers.memory-embed.rule=Host(`embed.${MEMORY_DOMAIN}`)"
      - "traefik.http.routers.memory-embed.tls=true"
      - "traefik.http.routers.memory-embed.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.memory-embed.middlewares=traefik-auth"
      - "traefik.http.services.memory-embed.loadbalancer.server.port=80"

  memory-qdrant:
    image: qdrant/qdrant:latest
    container_name: memory-qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"  # localhost only — for manual backup runs
    volumes:
      - qdrant_storage:/qdrant/storage:rw
      - qdrant_snapshots:/qdrant/snapshots:rw
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.memory-qdrant.entrypoints=https"
      - "traefik.http.routers.memory-qdrant.rule=Host(`qdrant.${MEMORY_DOMAIN}`)"
      - "traefik.http.routers.memory-qdrant.tls=true"
      - "traefik.http.routers.memory-qdrant.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.memory-qdrant.middlewares=traefik-auth"
      - "traefik.http.services.memory-qdrant.loadbalancer.server.port=6333"

  memory-mcp:
    image: ghcr.io/dzarlax/personal-memory:latest
    container_name: memory-mcp
    restart: always
    env_file: .env
    environment:
      - MCP_PORT=8000
      - TODOIST_MCP_PORT=8001
      - QDRANT_URL=http://memory-qdrant:6333
      - EMBED_URL=http://memory-embeddings:80
      - ENABLE_TODOIST=${ENABLE_TODOIST:-false}
      - ENABLE_VIZ=${ENABLE_VIZ:-false}
    volumes:
      - qdrant_snapshots:/qdrant/snapshots:rw
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # Memory MCP
      - "traefik.http.routers.memory-mcp.entrypoints=https"
      - "traefik.http.routers.memory-mcp.rule=Host(`mcp.${MEMORY_DOMAIN}`) && PathPrefix(`/memory`)"
      - "traefik.http.routers.memory-mcp.tls=true"
      - "traefik.http.routers.memory-mcp.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.memory-mcp.middlewares=traefik-auth,memory-rewrite"
      - "traefik.http.middlewares.memory-rewrite.replacepathregex.regex=/memory(.*)"
      - "traefik.http.middlewares.memory-rewrite.replacepathregex.replacement=/mcp$$1"
      - "traefik.http.services.memory-mcp.loadbalancer.server.port=8000"
      # Todoist MCP (same container, port 8001)
      - "traefik.http.routers.todoist-mcp.entrypoints=https"
      - "traefik.http.routers.todoist-mcp.rule=Host(`mcp.${MEMORY_DOMAIN}`) && PathPrefix(`/todoist`)"
      - "traefik.http.routers.todoist-mcp.tls=true"
      - "traefik.http.routers.todoist-mcp.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.todoist-mcp.middlewares=traefik-auth,todoist-rewrite"
      - "traefik.http.middlewares.todoist-rewrite.replacepathregex.regex=/todoist(.*)"
      - "traefik.http.middlewares.todoist-rewrite.replacepathregex.replacement=/mcp$$1"
      - "traefik.http.services.todoist-mcp.loadbalancer.server.port=8001"
      # Visualization (same container, port 8080)
      - "traefik.http.routers.memory-viz.entrypoints=https"
      - "traefik.http.routers.memory-viz.rule=Host(`mcp.${MEMORY_DOMAIN}`) && PathPrefix(`/viz`)"
      - "traefik.http.routers.memory-viz.tls=true"
      - "traefik.http.routers.memory-viz.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.memory-viz.middlewares=authentik-auth,viz-strip"
      - "traefik.http.middlewares.viz-strip.stripprefix.prefixes=/viz"
      - "traefik.http.services.memory-viz.loadbalancer.server.port=8080"

volumes:
  qdrant_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/memory/qdrant_storage

  qdrant_snapshots:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/memory/qdrant_snapshots

networks:
  traefik:
    external: true
