services:
  memory-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference@sha256:492506e6a76ce6d0fd834a49f69bee4134f5b37de06052519d358a3d5387434d
    container_name: memory-embeddings
    command: --model-id ${EMBED_MODEL:-intfloat/multilingual-e5-small} --revision ${EMBED_MODEL_REVISION:-614241f622f53c4eeff9890bdc4f31cfecc418b3}
    restart: always
    networks:
      - traefik
    deploy:
      resources:
        limits:
          memory: 2G

  memory-qdrant:
    image: qdrant/qdrant@sha256:f1c7272cdac52b38c1a0e89313922d940ba50afd90d593a1605dbbc214e66ffb
    container_name: memory-qdrant
    restart: always
    ports:
      - "127.0.0.1:6333:6333"  # localhost only — for debug via dashboard
    volumes:
      - qdrant_storage:/qdrant/storage:rw
      - qdrant_snapshots:/qdrant/snapshots:rw
    networks:
      - traefik

  memory-mcp:
    image: ghcr.io/dzarlax-ai/personal-memory:latest
    container_name: memory-mcp
    restart: always
    env_file: .env
    environment:
      - MCP_PORT=8000
      - QDRANT_URL=http://memory-qdrant:6333
      - EMBED_URL=http://memory-embeddings:80
      - EMBED_MODEL=${EMBED_MODEL:-intfloat/multilingual-e5-small}
      - EMBED_MODEL_REVISION=${EMBED_MODEL_REVISION:-614241f622f53c4eeff9890bdc4f31cfecc418b3}
      - ADOPT_EXISTING_EMBEDDING_IDENTITY=${ADOPT_EXISTING_EMBEDDING_IDENTITY:-false}
      - ENABLE_TODOIST=${ENABLE_TODOIST:-false}
      - ENABLE_VIZ=${ENABLE_VIZ:-false}
    volumes:
      - qdrant_snapshots:/qdrant/snapshots:rw
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # MCP endpoints — no Traefik auth, app checks X-API-Key
      - "traefik.http.routers.memory-mcp.entrypoints=https"
      - "traefik.http.routers.memory-mcp.rule=Host(`mcp.${MEMORY_DOMAIN}`) && (PathPrefix(`/memory`) || PathPrefix(`/todoist`) || Path(`/.well-known/oauth-protected-resource`) || Path(`/health`))"
      - "traefik.http.routers.memory-mcp.tls.certresolver=letsEncrypt"
      - "traefik.http.services.memory-mcp.loadbalancer.server.port=8000"
      # Viz dashboard — protected by Authentik ForwardAuth
      - "traefik.http.routers.memory-viz.entrypoints=https"
      - "traefik.http.routers.memory-viz.rule=Host(`mcp.${MEMORY_DOMAIN}`) && PathPrefix(`/viz`)"
      - "traefik.http.routers.memory-viz.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.memory-viz.middlewares=authentik-auth,memory-viz-proxy-secret"
      - "traefik.http.routers.memory-viz.service=memory-mcp"
      # Overwrite any browser-supplied value after ForwardAuth succeeds.
      - "traefik.http.middlewares.memory-viz-proxy-secret.headers.customrequestheaders.X-Personal-Memory-Proxy-Secret=${VIZ_PROXY_SECRET}"

volumes:
  qdrant_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/memory/qdrant_storage

  qdrant_snapshots:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/memory/qdrant_snapshots

networks:
  traefik:
    external: true
